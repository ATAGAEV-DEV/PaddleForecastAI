name: Deploy to Local Server

on:
  workflow_dispatch:
  # push:
  #   branches: [ "main" ]

jobs:
  build_deploy:
    runs-on: self-hosted

    steps:
      # Шаг 1: Скачиваем свежий код прямо на домашний сервер
      - name: Checkout repository
        uses: actions/checkout@v4

      # Шаг 2: Сборка Docker-образа локально
      - name: Build Docker image
        run: docker build . --file Dockerfile --tag paddleforecastbot:latest

      # Шаг 3: Остановка старого контейнера (ошибки игнорируются, если его нет)
      - name: Stop and remove old container
        run: |
          docker stop paddlebot || true
          docker rm paddlebot || true

      # Шаг 4: Запуск нового контейнера с передачей всех нужных переменных окружения
      - name: Run new container
        run: |
          docker run -d --name paddlebot \
            --restart unless-stopped \
            -e AI_TOKEN_POLZA="${{ secrets.AI_TOKEN_POLZA }}" \
            -e DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            -e TG_TOKEN="${{ secrets.TG_TOKEN }}" \
            -e WEATHER_API="${{ secrets.WEATHER_API }}" \
            paddleforecastbot:latest

      # Шаг 5 (Опционально): Очистка старых "повисших" образов, чтобы не забивать память мини-ПК
      - name: Clean up unused Docker images
        run: docker image prune -f
